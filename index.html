
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Todo App</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f1f3f4;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .todo-container {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .title {
            text-align: center;
            font-size: 40px;
            margin-bottom: 30px;
            color: #202124;
        }

        .todo-inputs {
            display: grid;
            grid-template-columns: 1fr 180px 120px;
            gap: 15px;
            margin-bottom: 30px;
        }

        .todo-inputs input {
            padding: 14px;
            border: 1px solid #dadce0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        .todo-inputs input:focus {
            border-color: #1a73e8;
        }

        .add-btn {
            border: none;
            background: #1a73e8;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .add-btn:hover {
            background: #0b57d0;
        }

        .todo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 18px;
            border-radius: 14px;
            margin-bottom: 15px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .todo-info {
            flex: 1;
        }

        .todo-name {
            font-size: 18px;
            font-weight: bold;
            color: #202124;
            margin-bottom: 6px;
        }

        .todo-date {
            font-size: 14px;
            color: #5f6368;
        }

        .todo-buttons {
            display: flex;
            gap: 10px;
        }

        .edit-btn,
        .delete-btn {
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }

        .edit-btn {
            background: #f9ab00;
        }

        .edit-btn:hover {
            background: #e69500;
        }

        .delete-btn {
            background: #d93025;
        }

        .delete-btn:hover {
            background: #b3261e;
        }

        .empty-message {
            text-align: center;
            color: #5f6368;
            margin-top: 20px;
            font-size: 18px;
        }

        @media(max-width:700px) {

            .todo-inputs {
                grid-template-columns: 1fr;
            }

            .add-btn {
                padding: 14px;
            }

            .title {
                font-size: 30px;
            }
        }

    </style>
</head>

<body>

    <div class="todo-container">

        <h1 class="title">Todo App</h1>

        <div class="todo-inputs">

            <input type="text" class="todo-input" placeholder="Enter Todo Item">

            <input type="date" class="date-input">

            <button class="add-btn" onclick="addTodo()">Add Todo</button>

        </div>

        <div class="todo-display"></div>

    </div>


    <script>

        // localStorage se todos lao
        let todos = JSON.parse(localStorage.getItem('todos')) || [];


        // page load hote hi todos display karo
        displayTodos();


        // Add Todo Function
        function addTodo() {

            let todoInput = document.querySelector('.todo-input');
            let dateInput = document.querySelector('.date-input');

            let todoName = todoInput.value.trim();
            let todoDate = dateInput.value;


            // validation
            if (todoName === '' || todoDate === '') {
                alert('Please enter todo and date');
                return;
            }


            // object array me push karo
            todos.push({
                name: todoName,
                date: todoDate
            });


            // localStorage me save karo
            saveToLocalStorage();


            // inputs clear karo
            todoInput.value = '';
            dateInput.value = '';


            // todos dubara display karo
            displayTodos();
        }


        // Display Todos Function
        function displayTodos() {

            let todoDisplay = document.querySelector('.todo-display');

            let content = '';


            // agar todos empty hon
            if (todos.length === 0) {

                content = `
                    <p class="empty-message">
                        No Todos Available
                    </p>
                `;
            }


            // loop
            for (let i = 0; i < todos.length; i++) {

                content += `

                    <div class="todo-item">

                        <div class="todo-info">

                            <div class="todo-name">
                                ${todos[i].name}
                            </div>

                            <div class="todo-date">
                                ${todos[i].date}
                            </div>

                        </div>


                        <div class="todo-buttons">

                            <button class="edit-btn"
                                onclick="editTodo(${i})">
                                Edit
                            </button>

                            <button class="delete-btn"
                                onclick="deleteTodo(${i})">
                                Delete
                            </button>

                        </div>

                    </div>
                `;
            }


            // HTML me show karo
            todoDisplay.innerHTML = content;
        }


        // Delete Todo Function
        function deleteTodo(index) {

            todos.splice(index, 1);

            saveToLocalStorage();

            displayTodos();
        }


        // Edit Todo Function
        function editTodo(index) {

            let updatedTodo = prompt(
                'Enter Updated Todo',
                todos[index].name
            );


            // cancel handle
            if (updatedTodo === null) {
                return;
            }


            updatedTodo = updatedTodo.trim();


            // empty validation
            if (updatedTodo === '') {
                alert('Todo cannot be empty');
                return;
            }


            // update object
            todos[index].name = updatedTodo;


            saveToLocalStorage();

            displayTodos();
        }


        // LocalStorage Save Function
        function saveToLocalStorage() {

            localStorage.setItem(
                'todos',
                JSON.stringify(todos)
            );
        }

    </script>

</body>

</html>
